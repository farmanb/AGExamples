</div> <div id="example-2_3_4-1-2" class="ptx-sagecell sagecell-sage"><script type="text/x-sage"># Example 4
R.<x,y,z> = PolynomialRing(QQ,order="lex")
f = x^2*y + x*y^2 + y^2
F = [y^2 - 1,x*y - 1]
qs, r = npoly_div(f,F)
print("Result:\r\n\r\tqs = [%s]\r\n\r\tr = %s" % (", ".join([str(q) for q in qs]),str(r)))

#Check that (\sum_{i=1}^s q_i*f_i) + r is actually f.
print(f == sum(q*g for q, g in zip(qs, F)) + r)
