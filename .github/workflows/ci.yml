name: Lighthouse CI – Accessibility

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pretext-cli
        run: pip install pretext

      - name: Build PreTeXt project (web target)
        run: pretext build web

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun | tee lhci-output.txt
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Extract single report URLs
        run: |
          grep -o 'https://storage.googleapis.com[^ ]*\.report\.html' lhci-output.txt | sed 's|^|https://googlechrome.github.io/lighthouse-ci/viewer/?report=|'
